name: Deploy Safea to Cloud Run

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: studio-7947485546-b2906
  REGION: asia-southeast2
  SERVICE_NAME: safea

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file from Secrets
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" > .env
          # Tambahkan variabel lain jika ada di GitHub Secrets
          # echo "OTHER_KEY=${{ secrets.OTHER_KEY }}" >> .env

      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          # Disarankan menggunakan Workload Identity Federation. 
          # Jika menggunakan Service Account Key, masukkan ke secrets.GCP_SA_KEY
          credentials_json: "${{ secrets.GCP_SA_KEY }}"

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Authorize Docker
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and Push Container
        run: |
          DOCKER_TAG="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/cloud-run-source-deploy/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          docker build -t $DOCKER_TAG .
          docker push $DOCKER_TAG
          echo "DOCKER_TAG=$DOCKER_TAG" >> $GITHUB_ENV

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/cloud-run-source-deploy/${{ env.SERVICE_NAME }}:${{ github.sha }}
          flags: "--allow-unauthenticated --port=8080"
